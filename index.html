<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>植物管理アプリ</title>
  <style>
    :root {
      --bg: #f5f5f4;
      --text: #171717;
      --muted: #737373;
      --border: #e5e5e5;
      --card: rgba(255,255,255,0.88);
      --emerald: #059669;
      --emerald-dark: #047857;
      --red: #dc2626;
      --teal: #0d9488;
      --indigo: #4f46e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: var(--plant-bg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.08;
      filter: grayscale(10%);
      pointer-events: none;
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.76);
      pointer-events: none;
      z-index: -1;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .wrap {
      max-width: 1152px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .header-inner {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    main {
      max-width: 1152px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }
    @media (max-width: 850px) {
      main { grid-template-columns: 1fr; }
      .subtitle { display: none; }
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .panel-pad { padding: 14px; }
    .search-box {
      width: 100%;
      border: 1px solid #d4d4d4;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
    }
    .tabs {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      font-size: 13px;
    }
    button, .file-button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 12px;
      background: #e5e5e5;
      color: #171717;
      transition: 0.15s ease;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(0.97); }
    .btn-primary { background: var(--emerald); color: #fff; }
    .btn-primary:hover { background: var(--emerald-dark); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-teal { background: var(--teal); color: #fff; }
    .btn-outline {
      background: rgba(255,255,255,0.9);
      border: 1px solid #d4d4d4;
      color: #171717;
    }
    .tab {
      padding: 7px 8px;
      border-radius: 9px;
      border: 1px solid #d4d4d4;
      background: rgba(255,255,255,0.9);
    }
    .tab.active {
      background: var(--emerald);
      border-color: var(--emerald);
      color: #fff;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 70vh;
      overflow: auto;
      border-top: 1px solid var(--border);
    }
    .plant-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: 0.15s ease;
    }
    .plant-item:hover, .plant-item.active { background: rgba(236,253,245,0.8); }
    .plant-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .plant-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      object-fit: cover;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      background: rgba(250,250,250,0.9);
    }
    .truncate {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .plant-name { font-weight: 700; }
    .plant-sub { color: var(--muted); font-size: 13px; }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-neutral { background: #f5f5f5; color: #525252; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .badge-amber { background: #fef3c7; color: #b45309; }
    .badge-emerald { background: #d1fae5; color: #047857; }
    .small { font-size: 12px; color: #525252; }
    .empty {
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .detail {
      padding: 16px;
      min-height: 420px;
    }
    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .detail-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1, h2, h3 { margin: 0; }
    h2 { font-size: 26px; line-height: 1.25; }
    .muted { color: var(--muted); }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    @media (max-width: 700px) {
      .grid2 { grid-template-columns: 1fr; }
      .detail-head { flex-direction: column; }
      .detail-actions { justify-content: flex-start; }
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255,255,255,0.62);
    }
    .card h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: 0; }
    .info-label { color: var(--muted); }
    .info-value {
      font-weight: 600;
      text-align: right;
      max-width: 65%;
      overflow-wrap: anywhere;
    }
    .memo {
      white-space: pre-wrap;
      min-height: 80px;
      font-size: 14px;
    }
    .image-preview {
      width: 100%;
      height: 192px;
      border-radius: 14px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fafafa;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .hidden-input { display: none; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      width: 100%;
      max-width: 720px;
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    }
    .modal-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body {
      padding: 16px;
      display: grid;
      gap: 16px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    label.form-label {
      display: block;
      font-size: 13px;
      color: #525252;
      margin-bottom: 4px;
    }
    input, textarea {
      font: inherit;
    }
    .input, .textarea {
      width: 100%;
      border: 1px solid #d4d4d4;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }
    .textarea {
      min-height: 92px;
      resize: vertical;
    }
    .template-buttons {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }
    .login-wrap { position: relative; }
    .login-pop {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: 320px;
      max-width: calc(100vw - 32px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.16);
      padding: 12px;
      z-index: 60;
    }
    .login-pop-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-list {
      display: grid;
      gap: 8px;
    }
    .email-row {
      display: flex;
      gap: 8px;
    }
    .footer {
      max-width: 1152px;
      margin: 0 auto;
      padding: 0 16px 32px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

    const TEMPLATES = {
      "サボテン": { wateringIntervalDays: 14, repotIntervalMonths: 24 },
      "多肉": { wateringIntervalDays: 10, repotIntervalMonths: 18 },
      "観葉": { wateringIntervalDays: 7, repotIntervalMonths: 12 },
      "観葉（高湿）": { wateringIntervalDays: 5, repotIntervalMonths: 12 },
      "観葉（耐陰）": { wateringIntervalDays: 10, repotIntervalMonths: 18 }
    };

    const LS_USER = "PLANTCARE_USER_HTML";

    const state = {
      user: null,
      plants: [],
      query: "",
      filterTab: "all",
      selectedId: null,
      showForm: false,
      editingId: null,
      loginOpen: false,
      emailInput: ""
    };

    function newId() {
      return String(Date.now()) + "_" + Math.random().toString(36).slice(2, 7);
    }

    function fmt(d) {
      if (!d) return "";
      return new Date(d).toISOString().slice(0, 10);
    }

    function todayStr() {
      return fmt(new Date());
    }

    function addDays(dateStr, days) {
      const d = dateStr ? new Date(dateStr) : new Date();
      d.setDate(d.getDate() + Number(days || 0));
      return fmt(d);
    }

    function addMonths(dateStr, months) {
      const d = dateStr ? new Date(dateStr) : new Date();
      d.setMonth(d.getMonth() + Number(months || 0));
      return fmt(d);
    }

    function diffDays(fromStr, toStr) {
      const a = new Date(fmt(fromStr));
      const b = new Date(fmt(toStr));
      return Math.round((b.getTime() - a.getTime()) / 86400000);
    }

    function emptyPlant() {
      return {
        id: newId(),
        name: "",
        species: "",
        purchaseDate: "",
        location: "",
        lastWateredDate: "",
        wateringIntervalDays: "",
        lastRepottedDate: "",
        repotIntervalMonths: "",
        notes: "",
        image: ""
      };
    }

    function digitsOnly(s) {
      const arr = String(s || "").split("");
      const out = [];
      for (const ch of arr) {
        if (ch >= "0" && ch <= "9") out.push(ch);
      }
      return out.join("");
    }

    function calc(p) {
      const wInt = Number(p.wateringIntervalDays || 0);
      const rInt = Number(p.repotIntervalMonths || 0);

      const lastWater = p.lastWateredDate || p.purchaseDate;
      const nextWatering = wInt && lastWater ? addDays(lastWater, wInt) : "";
      const daysToWater = nextWatering ? diffDays(todayStr(), nextWatering) : null;

      const repotBase = p.lastRepottedDate || p.purchaseDate;
      const nextRepot = rInt && repotBase ? addMonths(repotBase, rInt) : "";
      const daysToRepot = nextRepot ? diffDays(todayStr(), nextRepot) : null;

      return { nextWatering, daysToWater, nextRepot, daysToRepot };
    }

    function makeStatus(days) {
      if (days == null) return { label: "未設定", cls: "badge badge-neutral" };
      if (days < 0) return { label: "超過 " + String(-days) + "日", cls: "badge badge-red" };
      if (days === 0) return { label: "今日", cls: "badge badge-orange" };
      if (days <= 2) return { label: "あと" + String(days) + "日", cls: "badge badge-amber" };
      return { label: "あと" + String(days) + "日", cls: "badge badge-emerald" };
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getStorageKey() {
      if (!state.user) return "PLANTCARE_GUEST_HTML";
      return "PLANTCARE_" + state.user.provider + "_" + state.user.identifier + "_HTML";
    }

    function loadUser() {
      try {
        const raw = localStorage.getItem(LS_USER);
        state.user = raw ? JSON.parse(raw) : null;
      } catch (e) {
        state.user = null;
      }
    }

    function saveUser() {
      if (state.user) localStorage.setItem(LS_USER, JSON.stringify(state.user));
      else localStorage.removeItem(LS_USER);
    }

    function loadPlants() {
      try {
        const raw = localStorage.getItem(getStorageKey());
        state.plants = raw ? JSON.parse(raw) : [];
        state.selectedId = null;
      } catch (e) {
        state.plants = [];
        state.selectedId = null;
      }
    }

    function savePlants() {
      localStorage.setItem(getStorageKey(), JSON.stringify(state.plants));
    }

    function getFilteredPlants() {
      const q = state.query.trim().toLowerCase();
      let arr = q
        ? state.plants.filter(function(p) {
            const fields = [p.name, p.species, p.location, p.notes];
            for (const v of fields) {
              if (String(v || "").toLowerCase().includes(q)) return true;
            }
            return false;
          })
        : state.plants.slice();

      arr = arr.filter(function(p) {
        const d = calc(p).daysToWater;
        if (state.filterTab === "all") return true;
        if (state.filterTab === "today") return d === 0;
        if (state.filterTab === "overdue") return d != null && d < 0;
        if (state.filterTab === "soon") return d != null && d > 0 && d <= 2;
        return true;
      });

      arr.sort(function(a, b) {
        const aa = calc(a).nextWatering || "9999-99-99";
        const bb = calc(b).nextWatering || "9999-99-99";
        return aa.localeCompare(bb);
      });

      return arr;
    }

    function getSelected(filtered) {
      return filtered.find(function(p) { return p.id === state.selectedId; }) || filtered[0] || null;
    }

    function login(provider, identifier) {
      state.user = {
        id: newId(),
        provider: provider,
        identifier: identifier,
        name: provider === "Email" ? identifier : provider + "ユーザー"
      };
      saveUser();
      loadPlants();
      state.loginOpen = false;
      render();
    }

    function logout() {
      state.user = null;
      saveUser();
      loadPlants();
      render();
    }

    function upsertPlant(p) {
      const idx = state.plants.findIndex(function(x) { return x.id === p.id; });
      if (idx >= 0) state.plants[idx] = Object.assign({}, state.plants[idx], p);
      else state.plants.unshift(p);
      state.selectedId = p.id;
      state.showForm = false;
      state.editingId = null;
      savePlants();
      render();
    }

    function deletePlant(id) {
      if (!confirm("この植物を削除しますか？")) return;
      state.plants = state.plants.filter(function(p) { return p.id !== id; });
      if (state.selectedId === id) state.selectedId = null;
      savePlants();
      render();
    }

    function markWatered(id) {
      const t = todayStr();
      state.plants = state.plants.map(function(p) {
        return p.id === id ? Object.assign({}, p, { lastWateredDate: t }) : p;
      });
      savePlants();
      render();
    }

    function markRepotted(id) {
      const t = todayStr();
      state.plants = state.plants.map(function(p) {
        return p.id === id ? Object.assign({}, p, { lastRepottedDate: t }) : p;
      });
      savePlants();
      render();
    }

    function setPlantImage(id, dataUrl) {
      state.plants = state.plants.map(function(p) {
        return p.id === id ? Object.assign({}, p, { image: dataUrl }) : p;
      });
      savePlants();
      render();
    }

    function readFileAsDataUrl(file, cb) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        cb(String(ev.target.result || ""));
      };
      reader.readAsDataURL(file);
    }

    function avatarHtml(p) {
      if (p.image) {
        return '<img class="avatar" src="' + esc(p.image) + '" alt="' + esc(p.name || "plant") + '">';
      }
      return '<div class="avatar">🌿</div>';
    }

    function renderHeader() {
      const userHtml = state.user
        ? '<div class="user-info"><span class="small">👤 ' + esc(state.user.name) + '（' + esc(state.user.provider) + '）</span> <button class="btn" data-action="logout">ログアウト</button></div>'
        : renderLoginMenu();

      return ''
        + '<header>'
        + '  <div class="wrap header-inner">'
        + '    <div class="title">🌱 植物管理アプリ</div>'
        + '    <div class="subtitle">ログイン / ローカル保存 / HTML版</div>'
        + '    <div class="header-actions">'
        +        userHtml
        + '      <button class="btn btn-primary" data-action="open-add">＋ 植物を追加</button>'
        + '      <button class="btn" data-action="clear-data">データ全削除</button>'
        + '    </div>'
        + '  </div>'
        + '</header>';
    }

    function renderLoginMenu() {
      const pop = state.loginOpen ? ''
        + '<div class="login-pop">'
        + '  <div class="login-pop-title">ログイン方法</div>'
        + '  <div class="login-list">'
        + '    <button class="btn btn-outline" data-action="login-provider" data-provider="Google">🟢 Googleでログイン（擬似）</button>'
        + '    <button class="btn btn-outline" data-action="login-provider" data-provider="Apple">⚪ Appleでログイン（擬似）</button>'
        + '    <button class="btn btn-outline" data-action="login-provider" data-provider="LINE">🟩 LINEでログイン（擬似）</button>'
        + '    <div class="email-row">'
        + '      <input id="emailLoginInput" class="input" value="' + esc(state.emailInput) + '" placeholder="example@email.com">'
        + '      <button class="btn btn-primary" data-action="login-email">送信</button>'
        + '    </div>'
        + '    <div class="small">※ 本物の認証ではありません（デモ）</div>'
        + '    <button class="btn" data-action="close-login">閉じる</button>'
        + '  </div>'
        + '</div>' : '';

      return ''
        + '<div class="login-wrap">'
        + '  <button class="btn btn-outline" data-action="toggle-login">ログイン</button>'
        +    pop
        + '</div>';
    }

    function renderSidebar(filtered) {
      const tabs = [
        { key: "all", label: "すべて" },
        { key: "today", label: "今日" },
        { key: "overdue", label: "超過" },
        { key: "soon", label: "もうすぐ" }
      ];

      let items = "";
      if (!filtered.length) {
        items = '<li class="empty">一致する植物がありません。</li>';
      } else {
        items = filtered.map(function(p) {
          const c = calc(p);
          const st = makeStatus(c.daysToWater);
          const active = state.selectedId === p.id ? " active" : "";
          return ''
            + '<li class="plant-item' + active + '" data-action="select" data-id="' + esc(p.id) + '">'
            + '  <div class="plant-row">'
            + '    <div class="plant-left">'
            +        avatarHtml(p)
            + '      <div class="truncate">'
            + '        <div class="plant-name truncate">' + esc(p.name || "（名称未設定）") + '</div>'
            + '        <div class="plant-sub truncate">' + esc(p.species || "種類未登録") + ' ・ ' + esc(p.location || "置き場所") + '</div>'
            + '      </div>'
            + '    </div>'
            + '    <div class="' + st.cls + '">' + esc(st.label) + '</div>'
            + '  </div>'
            + '  <div class="small" style="margin-top:4px;">次回水やり：' + esc(c.nextWatering || "—") + '</div>'
            + '</li>';
        }).join("");
      }

      const tabsHtml = tabs.map(function(t) {
        const cls = state.filterTab === t.key ? "tab active" : "tab";
        return '<button class="' + cls + '" data-action="set-filter" data-filter="' + esc(t.key) + '">' + esc(t.label) + '</button>';
      }).join("");

      return ''
        + '<aside class="panel">'
        + '  <div class="panel-pad">'
        + '    <input class="search-box" id="searchInput" value="' + esc(state.query) + '" placeholder="名前・種類・置き場所・メモで検索">'
        + '    <div class="tabs">' + tabsHtml + '</div>'
        + '  </div>'
        + '  <ul class="list">' + items + '</ul>'
        + '</aside>';
    }

    function renderDetail(selected) {
      if (!selected) {
        return '<section class="panel detail"><div class="muted">左の一覧から植物を選択してください。</div></section>';
      }

      const c = calc(selected);
      const st = makeStatus(c.daysToWater);
      const imageBlock = selected.image
        ? '<img class="image-preview" src="' + esc(selected.image) + '" alt="plant">'
        : '<div class="image-preview">画像なし</div>';

      return ''
        + '<section class="panel detail">'
        + '  <div class="detail-head">'
        + '    <div class="detail-title-row">'
        +        avatarHtml(selected)
        + '      <div>'
        + '        <h2>' + esc(selected.name || "（名称未設定）") + '</h2>'
        + '        <div class="muted">' + esc(selected.species || "種類未登録") + ' ・ ' + esc(selected.location || "置き場所未登録") + '</div>'
        + '        <div class="' + st.cls + '" style="display:inline-block;margin-top:6px;">' + esc(st.label) + '</div>'
        + '      </div>'
        + '    </div>'
        + '    <div class="detail-actions">'
        + '      <button class="btn" data-action="open-edit" data-id="' + esc(selected.id) + '">編集</button>'
        + '      <button class="btn btn-danger" data-action="delete" data-id="' + esc(selected.id) + '">削除</button>'
        + '    </div>'
        + '  </div>'
        + '  <div class="grid2">'
        + '    <div class="card">'
        + '      <h3>水やり</h3>'
        +        rowHtml("最終水やり", selected.lastWateredDate || "—")
        +        rowHtml("間隔（日）", selected.wateringIntervalDays || "—")
        +        rowHtml("次回", c.nextWatering || "—")
        + '      <div style="margin-top:10px;"><button class="btn btn-primary" data-action="mark-watered" data-id="' + esc(selected.id) + '">今日 水やり済みにする</button></div>'
        + '    </div>'
        + '    <div class="card">'
        + '      <h3>植え替え</h3>'
        +        rowHtml("最終植え替え", selected.lastRepottedDate || "—")
        +        rowHtml("間隔（月）", selected.repotIntervalMonths || "—")
        +        rowHtml("次回", c.nextRepot || "—")
        + '      <div style="margin-top:10px;"><button class="btn btn-teal" data-action="mark-repotted" data-id="' + esc(selected.id) + '">今日 植え替え済みにする</button></div>'
        + '    </div>'
        + '  </div>'
        + '  <div class="grid2">'
        + '    <div class="card">'
        + '      <h3>基本情報</h3>'
        +        rowHtml("購入日", selected.purchaseDate || "—")
        +        rowHtml("設置場所", selected.location || "—")
        + '    </div>'
        + '    <div class="card">'
        + '      <h3>画像（1枚）</h3>'
        +        imageBlock
        + '      <label class="file-button" style="margin-top:10px;display:inline-block;">'
        + '        <span class="btn">' + (selected.image ? "画像を差し替える" : "画像を登録する") + '</span>'
        + '        <input class="hidden-input" type="file" accept="image/*" data-action="detail-image" data-id="' + esc(selected.id) + '">'
        + '      </label>'
        + '    </div>'
        + '  </div>'
        + '  <div class="card" style="margin-top:16px;">'
        + '    <h3>メモ</h3>'
        + '    <div class="memo">' + esc(selected.notes || "—") + '</div>'
        + '  </div>'
        + '</section>';
    }

    function rowHtml(label, value) {
      return ''
        + '<div class="info-row">'
        + '  <div class="info-label">' + esc(label) + '</div>'
        + '  <div class="info-value">' + esc(value) + '</div>'
        + '</div>';
    }

    function renderForm() {
      if (!state.showForm) return "";
      const p = state.editingId
        ? Object.assign({}, state.plants.find(function(x) { return x.id === state.editingId; }) || emptyPlant())
        : (state.formDraft || emptyPlant());

      if (!state.formDraft || state.formDraft.id !== p.id) {
        state.formDraft = p;
      }

      const templateBtns = Object.keys(TEMPLATES).map(function(k) {
        return '<button class="btn" data-action="apply-template" data-template="' + esc(k) + '">' + esc(k) + 'テンプレ</button>';
      }).join("");

      const img = state.formDraft.image
        ? '<img class="image-preview" src="' + esc(state.formDraft.image) + '" alt="plant">'
        : '<div class="image-preview">画像なし</div>';

      return ''
        + '<div class="modal-backdrop">'
        + '  <div class="modal">'
        + '    <div class="modal-head">'
        + '      <h3>植物の登録/編集</h3>'
        + '      <button class="btn" data-action="close-form">閉じる</button>'
        + '    </div>'
        + '    <div class="modal-body">'
        + '      <div class="form-grid">'
        +          formInput("名前", "name", "例）アガベ・チタノタ")
        + '        <div>'
        + '          <label class="form-label">種類</label>'
        + '          <input class="input" data-form-field="species" value="' + esc(state.formDraft.species) + '" placeholder="例）サボテン / 多肉 / 観葉">'
        + '          <div class="template-buttons">' + templateBtns + '</div>'
        + '        </div>'
        + '      </div>'
        + '      <div class="form-grid">'
        +          formInput("購入日", "purchaseDate", "", "date")
        +          formInput("置き場所", "location", "例）窓際 / ベランダ")
        + '      </div>'
        + '      <div class="form-grid">'
        +          formInput("最終水やり", "lastWateredDate", "", "date")
        +          formInput("水やり間隔（日）", "wateringIntervalDays", "例）7", "text", true)
        + '      </div>'
        + '      <div class="form-grid">'
        +          formInput("最終植え替え", "lastRepottedDate", "", "date")
        +          formInput("植え替え間隔（月）", "repotIntervalMonths", "例）12", "text", true)
        + '      </div>'
        + '      <div>'
        + '        <label class="form-label">メモ</label>'
        + '        <textarea class="textarea" data-form-field="notes" placeholder="育成ログ・気づき">' + esc(state.formDraft.notes) + '</textarea>'
        + '      </div>'
        + '      <div class="form-grid">'
        + '        <div>'
        + '          <label class="form-label">画像（1枚）</label>'
        +            img
        + '          <label class="file-button" style="margin-top:10px;display:inline-block;">'
        + '            <span class="btn">' + (state.formDraft.image ? "画像を差し替える" : "画像を登録する") + '</span>'
        + '            <input class="hidden-input" type="file" accept="image/*" data-action="form-image">'
        + '          </label>'
        + '        </div>'
        + '        <div class="form-actions">'
        + '          <button class="btn" data-action="close-form">キャンセル</button>'
        + '          <button class="btn btn-primary" data-action="save-form">保存</button>'
        + '        </div>'
        + '      </div>'
        + '    </div>'
        + '  </div>'
        + '</div>';
    }

    function formInput(label, field, placeholder, type, numeric) {
      type = type || "text";
      const inputMode = numeric ? ' inputmode="numeric"' : "";
      const note = numeric ? '<div class="small" style="margin-top:4px;">※ 数字のみ</div>' : "";
      return ''
        + '<div>'
        + '  <label class="form-label">' + esc(label) + '</label>'
        + '  <input type="' + esc(type) + '" class="input" data-form-field="' + esc(field) + '" value="' + esc(state.formDraft[field] || "") + '" placeholder="' + esc(placeholder || "") + '"' + inputMode + '>'
        +    note
        + '</div>';
    }

    function render() {
      const filtered = getFilteredPlants();
      if (!state.selectedId && filtered.length) state.selectedId = filtered[0].id;
      const selected = getSelected(filtered);

      const html = ''
        + renderHeader()
        + '<main>'
        + renderSidebar(filtered)
        + renderDetail(selected)
        + '</main>'
        + '<div class="footer">iCal書き出し機能は削除済み。HTML単体版のため、このファイルをChromeで直接開けます。</div>'
        + renderForm();

      document.getElementById("app").innerHTML = html;
      attachEvents();
    }

    function attachEvents() {
      document.querySelectorAll("[data-action]").forEach(function(el) {
        const action = el.getAttribute("data-action");

        if (action === "toggle-login") {
          el.addEventListener("click", function() {
            state.loginOpen = !state.loginOpen;
            render();
          });
        }

        if (action === "close-login") {
          el.addEventListener("click", function() {
            state.loginOpen = false;
            render();
          });
        }

        if (action === "login-provider") {
          el.addEventListener("click", function() {
            const provider = el.getAttribute("data-provider");
            login(provider, provider.toLowerCase() + "_" + newId());
          });
        }

        if (action === "login-email") {
          el.addEventListener("click", function() {
            const input = document.getElementById("emailLoginInput");
            const v = input ? input.value.trim() : "";
            if (!v) return;
            login("Email", v);
          });
        }

        if (action === "logout") {
          el.addEventListener("click", logout);
        }

        if (action === "open-add") {
          el.addEventListener("click", function() {
            state.formDraft = emptyPlant();
            state.editingId = null;
            state.showForm = true;
            render();
          });
        }

        if (action === "clear-data") {
          el.addEventListener("click", function() {
            if (!confirm("このユーザーのローカル保存データを全削除しますか？")) return;
            localStorage.removeItem(getStorageKey());
            state.plants = [];
            state.selectedId = null;
            render();
          });
        }

        if (action === "select") {
          el.addEventListener("click", function() {
            state.selectedId = el.getAttribute("data-id");
            render();
          });
        }

        if (action === "set-filter") {
          el.addEventListener("click", function() {
            state.filterTab = el.getAttribute("data-filter");
            render();
          });
        }

        if (action === "open-edit") {
          el.addEventListener("click", function() {
            const id = el.getAttribute("data-id");
            const p = state.plants.find(function(x) { return x.id === id; });
            if (!p) return;
            state.formDraft = Object.assign({}, p);
            state.editingId = id;
            state.showForm = true;
            render();
          });
        }

        if (action === "delete") {
          el.addEventListener("click", function() {
            deletePlant(el.getAttribute("data-id"));
          });
        }

        if (action === "mark-watered") {
          el.addEventListener("click", function() {
            markWatered(el.getAttribute("data-id"));
          });
        }

        if (action === "mark-repotted") {
          el.addEventListener("click", function() {
            markRepotted(el.getAttribute("data-id"));
          });
        }

        if (action === "close-form") {
          el.addEventListener("click", function() {
            state.showForm = false;
            state.editingId = null;
            state.formDraft = null;
            render();
          });
        }

        if (action === "apply-template") {
          el.addEventListener("click", function() {
            const key = el.getAttribute("data-template");
            const t = TEMPLATES[key];
            if (!t) return;
            state.formDraft.species = state.formDraft.species || key;
            state.formDraft.wateringIntervalDays = String(t.wateringIntervalDays);
            state.formDraft.repotIntervalMonths = String(t.repotIntervalMonths);
            render();
          });
        }

        if (action === "save-form") {
          el.addEventListener("click", function() {
            collectFormFields();
            upsertPlant(state.formDraft);
          });
        }
      });

      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", function(e) {
          state.query = e.target.value;
          render();
        });
      }

      const emailInput = document.getElementById("emailLoginInput");
      if (emailInput) {
        emailInput.addEventListener("input", function(e) {
          state.emailInput = e.target.value;
        });
      }

      document.querySelectorAll("[data-form-field]").forEach(function(el) {
        el.addEventListener("input", function(e) {
          const field = el.getAttribute("data-form-field");
          let value = e.target.value;
          if (field === "wateringIntervalDays" || field === "repotIntervalMonths") {
            value = digitsOnly(value);
            e.target.value = value;
          }
          state.formDraft[field] = value;
        });
      });

      document.querySelectorAll('input[type="file"][data-action="detail-image"]').forEach(function(input) {
        input.addEventListener("change", function(e) {
          const file = e.target.files && e.target.files[0];
          const id = input.getAttribute("data-id");
          if (!file || !id) return;
          readFileAsDataUrl(file, function(dataUrl) {
            setPlantImage(id, dataUrl);
          });
        });
      });

      document.querySelectorAll('input[type="file"][data-action="form-image"]').forEach(function(input) {
        input.addEventListener("change", function(e) {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          readFileAsDataUrl(file, function(dataUrl) {
            state.formDraft.image = dataUrl;
            render();
          });
        });
      });
    }

    function collectFormFields() {
      document.querySelectorAll("[data-form-field]").forEach(function(el) {
        const field = el.getAttribute("data-form-field");
        let value = el.value || "";
        if (field === "wateringIntervalDays" || field === "repotIntervalMonths") {
          value = digitsOnly(value);
        }
        state.formDraft[field] = value;
      });
    }

    loadUser();
    loadPlants();
    render();
  </script>
</body>
</html>
